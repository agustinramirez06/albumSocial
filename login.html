<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum CSYDP — Club Social y Deportivo Pila</title>
    <meta name="description" content="Coleccioná, pegá y completá el álbum de figuritas virtuales del Club Social y Deportivo Pila. Campeones 2017, jugadores actuales, promesas e historia.">
    <meta property="og:title" content="Álbum CSYDP — Club Social y Deportivo Pila">
    <meta property="og:description" content="Coleccioná, pegá y completá el álbum de figuritas virtuales del Club Social y Deportivo Pila.">
    <meta property="og:image" content="https://wumpbrsnzoybwszjsbwv.supabase.co/storage/v1/object/public/images-album/portada-album.png">
    <meta property="og:url" content="https://www.clubsocialydeportivopila.com.ar/login.html">
    <meta property="og:type" content="website">
    <link rel="canonical" href="https://www.clubsocialydeportivopila.com.ar/login.html">
    <link rel="stylesheet" href="Styles/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Anybody:wght@400;700;800&family=Hanken+Grotesk:wght@400;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Álbum CSYDP",
      "url": "https://www.clubsocialydeportivopila.com.ar/",
      "description": "Álbum de figuritas virtuales del Club Social y Deportivo Pila",
      "publisher": {
        "@type": "Organization",
        "name": "Club Social y Deportivo Pila"
      },
      "inLanguage": "es"
    }
    </script>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <img src="assets/social-escudo-estrelladorada.png" alt="CSYDP Escudo" class="login-escudo">
                <h1 class="login-title">ALBUM CSYDP </h1>
                <p class="login-subtitle">Club Social y Deportivo Pila</p>
            </div>

            <div class="tab-bar">
                <button id="tab-login" class="tab active" onclick="setMode('login')">INICIAR SESIÓN</button>
                <button id="tab-register" class="tab" onclick="setMode('register')">REGISTRARSE</button>
            </div>

            <form onsubmit="event.preventDefault(); handleSubmit()" class="form-group">
                <label for="auth-email" class="sr-only">Correo electrónico</label>
                <input type="email" id="auth-email" class="input-field" placeholder="Correo electrónico" autocomplete="email">
                <label for="auth-password" class="sr-only">Contraseña</label>
                <input type="password" id="auth-password" class="input-field" placeholder="Contraseña" autocomplete="current-password">
                <label for="auth-username" class="sr-only">Nombre de usuario</label>
                <input type="text" id="auth-username" class="input-field hidden-input" placeholder="Nombre de usuario" autocomplete="username">
            </form>

            <span id="auth-error" class="error-msg" role="alert"></span>

            <button id="btn-submit" class="btn-submit" onclick="handleSubmit()">
                <span class="material-symbols-outlined">login</span>
                INICIAR SESIÓN
            </button>
        </div>
        <p style="font-family: 'Hanken Grotesk', sans-serif; color: #ffffff; opacity: 0.15; font-size: 11px; text-align: center; margin-top: 40px; max-width: 500px; line-height: 1.4; padding: 0 20px;">
           © 2026 <strong>Álbum</strong> de <strong>figuritas</strong> oficial del <strong>Club Social y Deportivo Pila</strong> (<strong>CSYDP</strong>)
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="App/login.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSYDP ALBUM - Iniciar Sesión</title>
    <link rel="stylesheet" href="Styles/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Anybody:wght@400;700;800&family=Hanken+Grotesk:wght@400;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <img src="assets/social-escudo-estrelladorada.png" alt="CSYDP Escudo" class="login-escudo">
                <h1 class="login-title">ALBUM CSYDP </h1>
                <p class="login-subtitle">Club Social y Deportivo Pila</p>
            </div>

            <div class="tab-bar">
                <button id="tab-login" class="tab active" onclick="setMode('login')">INICIAR SESIÓN</button>
                <button id="tab-register" class="tab" onclick="setMode('register')">REGISTRARSE</button>
            </div>

            <form onsubmit="event.preventDefault(); handleSubmit()" class="form-group">
                <label for="auth-email" class="sr-only">Correo electrónico</label>
                <input type="email" id="auth-email" class="input-field" placeholder="Correo electrónico" autocomplete="email">
                <label for="auth-password" class="sr-only">Contraseña</label>
                <input type="password" id="auth-password" class="input-field" placeholder="Contraseña" autocomplete="current-password">
                <label for="auth-username" class="sr-only">Nombre de usuario</label>
                <input type="text" id="auth-username" class="input-field hidden-input" placeholder="Nombre de usuario" autocomplete="username">
            </form>

            <span id="auth-error" class="error-msg" role="alert"></span>

            <button id="btn-submit" class="btn-submit" onclick="handleSubmit()">
                <span class="material-symbols-outlined">login</span>
                INICIAR SESIÓN
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="App/login.js"></script>
</body>
</html>
